<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080A10">
<meta name="description" content="长沙大泽湖 AI 线下圈子名片墙与合作图谱，快速查看 AI友能力、需求与可合作路径。">
<title>大泽湖 AI 圈子 · 名片墙 & 合作图谱</title>
<style>
:root {
  --bg: #080A10;
  --card: #0F1219;
  --card-hover: #141820;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.14);
  --text: #E8EAF0;
  --muted: #6B7080;
  --subtle: #3A3D4A;
  --c-edu: #22C55E;
  --c-ec: #3B82F6;
  --c-ai: #A855F7;
  --c-content: #F97316;
  --c-fin: #EAB308;
  --c-prod: #14B8A6;
  --c-law: #EC4899;
  --c-biz: #6B7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at 20% -10%, rgba(20,184,166,.16), transparent 34%),
    radial-gradient(circle at 85% 0%, rgba(168,85,247,.12), transparent 34%),
    linear-gradient(180deg, #090C13 0%, var(--bg) 34%, #07080C 100%);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  padding: 44px 40px 24px;
  max-width: 1280px;
  margin: 0 auto;
}
.header-eyebrow {
  font-size: 11px;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.header-title {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 600;
  letter-spacing: 0;
  margin-bottom: 10px;
}
.header-sub {
  font-size: clamp(16px, 2vw, 21px);
  color: #D6DBE7;
  line-height: 1.95;
  max-width: 860px;
  margin-top: 14px;
  font-weight: 350;
}
.header-sub .muted-line { color: #9BA3B4; }
.header-sub .highlight-line { color: #F2F5FA; }
.hero-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
.action-btn {
  border: 1px solid var(--border);
  background: rgba(255,255,255,.06);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 13px;
  font: inherit;
  font-size: 12px;
  cursor: pointer;
}
.action-btn:hover { border-color: var(--border-hover); background: rgba(255,255,255,.1); }
.stats {
  max-width:1280px;
  margin:0 auto;
  padding:0 40px 18px;
  display:grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap:10px;
}
.stat {
  border:1px solid var(--border);
  background:rgba(255,255,255,.035);
  border-radius:8px;
  padding:13px 14px;
}
.stat-num { font-size:22px; font-weight:650; }
.stat-label { font-size:11px; color:var(--muted); margin-top:4px; }
.wechat-tip {
  display:none;
  max-width:1280px;
  margin:0 auto 14px;
  padding:0 40px;
}
.wechat-tip-inner {
  border:1px solid rgba(234,179,8,.25);
  background:rgba(234,179,8,.08);
  color:#FDE68A;
  border-radius:8px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.6;
}

/* CONTROLS */
.controls {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 40px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.search-wrap {
  min-width:260px;
  flex: 1 1 280px;
  position: relative;
}
.search-input {
  width:100%;
  height:34px;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(15,18,25,.82);
  color:var(--text);
  padding:0 12px;
  outline:none;
  font:inherit;
  font-size:13px;
}
.search-input:focus { border-color:rgba(20,184,166,.55); box-shadow:0 0 0 3px rgba(20,184,166,.09); }
.filter-pill {
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.filter-pill:hover { border-color: var(--border-hover); color: var(--text); }
.filter-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.filter-pill[data-cat="edu"].active { background: var(--c-edu); border-color: var(--c-edu); color: #000; }
.filter-pill[data-cat="ec"].active { background: var(--c-ec); border-color: var(--c-ec); }
.filter-pill[data-cat="ai"].active { background: var(--c-ai); border-color: var(--c-ai); }
.filter-pill[data-cat="content"].active { background: var(--c-content); border-color: var(--c-content); color: #000; }
.filter-pill[data-cat="fin"].active { background: var(--c-fin); border-color: var(--c-fin); color: #000; }
.filter-pill[data-cat="prod"].active { background: var(--c-prod); border-color: var(--c-prod); color: #000; }
.filter-pill[data-cat="law"].active { background: var(--c-law); border-color: var(--c-law); }
.view-divider { flex: 1; }
.view-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.view-btn { font-size: 12px; padding: 6px 14px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-family: inherit; transition: all .15s; }
.view-btn.active { background: rgba(255,255,255,0.08); color: var(--text); }

/* MAIN LAYOUT */
.main { max-width: 1280px; margin: 0 auto; padding: 0 40px 60px; display: flex; gap: 24px; }

/* GRID */
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  align-content: start;
}

/* CARD */
.card {
  background: linear-gradient(180deg, rgba(255,255,255,.035), transparent 42%), var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-color, transparent);
  border-radius: 14px 14px 0 0;
  transition: opacity .2s;
  opacity: 0;
}
.card:hover {
  background: var(--card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.card:hover::before { opacity: 1; }
.card.active-card { border-color: var(--accent-color, var(--border-hover)); background: var(--card-hover); }
.card.active-card::before { opacity: 1; }
.card.dimmed { opacity: .35; }
.card.connected { border-color: var(--border-hover); }

.card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.avatar {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
  background: var(--avatar-bg, rgba(255,255,255,0.08));
  color: var(--avatar-color, var(--text));
}
.card-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.card-nick { font-size: 11px; color: var(--muted); margin-top: 1px; }
.cat-badge {
  margin-left: auto;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--badge-bg);
  color: var(--badge-color);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-bg { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }

.card-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 4px; }
.card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; width: 36px; flex-shrink: 0; padding-top: 1px; }
.card-val { font-size: 11px; color: var(--text); line-height: 1.5; }
.card-val.need { color: var(--accent-color, var(--text)); }

.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.tag-chip {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted);
}

/* PANEL */
.panel {
  width: 320px;
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  height: fit-content;
  position: sticky;
  top: 24px;
  transition: all .25s;
  display: none;
}
.panel.visible { display: block; }
.panel-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; }
.panel-avatar {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 600;
  margin-bottom: 12px;
}
.panel-name { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
.panel-cat { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
.panel-bio { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.panel-section-title { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.conn-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .15s;
}
.conn-chip:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.03); }
.conn-mini-avatar {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.conn-name { font-size: 12px; font-weight: 500; }
.conn-reason { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* CLUSTER VIEW */
.cluster-view { display: none; flex: 1; }
.cluster-view.active-view { display: block; }
.cluster-section { margin-bottom: 28px; }
.cluster-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cluster-dot { width: 8px; height: 8px; border-radius: 50%; }
.cluster-title { font-size: 14px; font-weight: 600; }
.cluster-count { font-size: 12px; color: var(--muted); }
.cluster-cards { display: flex; flex-wrap: wrap; gap: 8px; }
.mini-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: all .15s;
  min-width: 140px;
}
.mini-card:hover { border-color: var(--border-hover); background: var(--card-hover); }
.mini-card-name { font-size: 12px; font-weight: 500; }
.mini-card-sub { font-size: 10px; color: var(--muted); }

/* COLLAB MAP */
.collab-section { margin-top: 32px; }
.collab-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px; }
.collab-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.collab-row:last-child { border-bottom: none; }
.collab-icon { font-size: 16px; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
.collab-body { flex: 1; }
.collab-heading { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.collab-desc { font-size: 11px; color: var(--muted); line-height: 1.6; }
.collab-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.collab-chip {
  font-size: 10px; padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .15s;
}
.collab-chip:hover { background: rgba(255,255,255,0.1); }

/* EMPTY */
.empty { padding: 60px; text-align: center; color: var(--muted); font-size: 14px; }

@media (max-width: 768px) {
  .header { padding: 32px 20px 24px; }
  .stats { grid-template-columns: repeat(2, minmax(0,1fr)); padding:0 20px 14px; }
  .wechat-tip { padding:0 20px; }
  .controls { padding: 16px 20px; align-items:stretch; }
  .search-wrap { flex-basis:100%; min-width:0; }
  .main { padding: 0 20px 40px; flex-direction: column; }
  .panel {
    width: 100%;
    position: fixed;
    left:0; right:0; bottom:0; top:auto;
    max-height: 82vh;
    overflow:auto;
    border-radius: 14px 14px 0 0;
    z-index: 20;
    box-shadow: 0 -24px 60px rgba(0,0,0,.55);
  }
  .view-divider { display: none; }
  .filter-pill { flex: 1 1 auto; }
  .view-toggle { width:100%; }
  .view-btn { flex:1; }
}
</style>
</head>

function getCatPrimary(p) { return p.cats[0]; }
function catStyle(cat) { return CAT[cat] || CAT.biz; }
function avatarBg(cat) { return catStyle(cat).bg; }
function avatarColor(cat) { return catStyle(cat).color; }

let activeFilter = 'all';
let activeCard = null;
let searchText = '';

function includesText(value, text) {
  return String(value || '').toLowerCase().includes(text);
}

function personMatchesSearch(p) {
  if (!searchText) return true;
  const text = searchText.toLowerCase();
  return includesText(p.name, text)
    || includesText(p.nick, text)
    || includesText(p.bg, text)
    || includesText(p.provides, text)
    || includesText(p.needs, text)
    || p.cats.some(c => includesText(catStyle(c).label, text));
}

function getVisiblePeople() {
  return people.filter(p => (activeFilter === 'all' || p.cats.includes(activeFilter)) && personMatchesSearch(p));
}

function updateStats() {
  const catSet = new Set(people.flatMap(p => p.cats));
  const links = people.reduce((sum, p) => sum + p.connects.length, 0);
  document.getElementById('total-count').textContent = people.length;
  document.getElementById('cat-count').textContent = catSet.size;
  document.getElementById('link-count').textContent = links;
  document.getElementById('path-count').textContent = COLLABS.length;
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const filtered = getVisiblePeople();
  updateStats();
  if (!filtered.length) { grid.innerHTML = '<div class="empty">没有找到相关人员，换个关键词试试</div>'; return; }
  grid.innerHTML = filtered.map(p => {
    const cat = getCatPrimary(p);
    const cs = catStyle(cat);
    return `<div class="card" id="card-${p.id}" 
      style="--accent-color:${cs.color};--avatar-bg:${cs.bg};--avatar-color:${cs.color}"
      onclick="selectCard('${p.id}')">
      <div class="card-top">
        <div class="avatar" style="background:${cs.bg};color:${cs.color}">${p.avatar}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${p.name}${p.nick ? ` <span style="font-size:11px;font-weight:400;color:var(--muted)">${p.nick}</span>`:''}</div>
        </div>
        <span class="cat-badge" style="background:${cs.bg};color:${cs.color}">${cs.label}</span>
      </div>
      <p class="card-bg">${p.bg}</p>
      <div class="card-row">
        <span class="card-label">提供</span>
        <span class="card-val">${p.provides}</span>
      </div>
      <div class="card-row">
        <span class="card-label">寻找</span>
        <span class="card-val need">${p.needs}</span>
      </div>
    </div>`;
  }).join('');
}

function selectCard(id) {
  const p = people.find(x => x.id === id);
  if (!p) return;
  activeCard = id;

  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('active-card','connected','dimmed');
  });

  const el = document.getElementById('card-'+id);
  if (el) el.classList.add('active-card');

  p.connects.forEach(cid => {
    const cel = document.getElementById('card-'+cid);
    if (cel) cel.classList.add('connected');
  });

  document.querySelectorAll('.card').forEach(c => {
    if (!c.classList.contains('active-card') && !c.classList.contains('connected')) {
      c.classList.add('dimmed');
    }
  });

  renderPanel(p);
  document.getElementById('panel').classList.add('visible');
}

function renderPanel(p) {
  const cat = getCatPrimary(p);
  const cs = catStyle(cat);
  const connPeople = p.connects.map(cid => people.find(x => x.id === cid)).filter(Boolean);

  const canHelp = connPeople.filter(c => {
    return c.needs && p.provides && c.needs.split('、').some(n => p.provides.toLowerCase().includes(n.toLowerCase().slice(0,4)));
  });
  const needsHelp = connPeople.filter(c => !canHelp.includes(c));

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-avatar" style="background:${cs.bg};color:${cs.color}">${p.avatar}</div>
    <div class="panel-name">${p.name}${p.nick?` <span style="font-size:13px;font-weight:400;color:var(--muted)">${p.nick}</span>`:''}</div>
    <div class="panel-cat">${p.cats.map(c=>catStyle(c).label).join(' · ')}</div>
    <div class="panel-bio">${p.bg}</div>
    <div style="margin-bottom:6px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border)">
      <div class="panel-section-title" style="margin-bottom:4px">他/她可以提供</div>
      <div style="font-size:12px;color:${cs.color}">${p.provides}</div>
    </div>
    <div style="margin-bottom:16px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border)">
      <div class="panel-section-title" style="margin-bottom:4px">他/她正在寻找</div>
      <div style="font-size:12px;color:var(--muted)">${p.needs}</div>
    </div>
    <div class="panel-section-title">推荐认识的人（${connPeople.length}）</div>
    ${connPeople.map(c => {
      const cc = catStyle(getCatPrimary(c));
      return `<div class="conn-chip" onclick="selectCard('${c.id}')">
        <div class="conn-mini-avatar" style="background:${cc.bg};color:${cc.color}">${c.avatar}</div>
        <div>
          <div class="conn-name">${c.name}</div>
          <div class="conn-reason">${c.provides.split('、')[0]}</div>
        </div>
      </div>`;
    }).join('')}
  `;
}

function closePanel() {
  document.getElementById('panel').classList.remove('visible');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card','connected','dimmed'));
  activeCard = null;
}

function renderCluster() {
  const catGroups = {};
  people.forEach(p => {
    const cat = getCatPrimary(p);
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push(p);
  });

  let html = '';
  Object.entries(catGroups).forEach(([cat, ps]) => {
    const cs = catStyle(cat);
    html += `<div class="cluster-section">
      <div class="cluster-header">
        <div class="cluster-dot" style="background:${cs.color}"></div>
        <div class="cluster-title">${cs.label}</div>
        <div class="cluster-count">${ps.length}人</div>
      </div>
      <div class="cluster-cards">
        ${ps.map(p=>`<div class="mini-card" onclick="selectCard('${p.id}');setView('cards',document.querySelector('.view-btn'))">
          <div class="conn-mini-avatar" style="background:${cs.bg};color:${cs.color}">${p.avatar}</div>
          <div>
            <div class="mini-card-name">${p.name}</div>
            <div class="mini-card-sub">${p.provides.split('、')[0]}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  });

  html += `<div class="collab-section">
    <div class="collab-title">合作路径</div>
    ${COLLABS.map(c=>`<div class="collab-row">
      <div class="collab-icon">${c.icon}</div>
      <div class="collab-body">
        <div class="collab-heading">${c.title}</div>
        <div class="collab-desc">${c.desc}</div>
        <div class="collab-chips">
          ${c.left.map(n=>`<span class="collab-chip" onclick="selectCard('${n}');setView('cards',document.querySelectorAll('.view-btn')[0])">${n}</span>`).join('')}
          <span style="font-size:10px;color:var(--muted);align-self:center">↔</span>
          ${c.right.map(n=>`<span class="collab-chip" onclick="selectCard('${n}');setView('cards',document.querySelectorAll('.view-btn')[0])">${n}</span>`).join('')}
        </div>
      </div>
    </div>`).join('')}
  </div>`;

  document.getElementById('cluster-view').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closePanel();
  renderCards();
}

function setSearch(value) {
  searchText = value.trim();
  closePanel();
  renderCards();
}

function scrollToMap() {
  setView('cluster', document.querySelectorAll('.view-btn')[1]);
  document.getElementById('cluster-view').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function scrollToCards() {
  setView('cards', document.querySelectorAll('.view-btn')[0]);
  document.querySelector('.controls').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function detectWechat() {
  if (/micromessenger/i.test(navigator.userAgent)) {
    document.getElementById('wechat-tip').style.display = 'block';
  }
}

function setView(view, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const grid = document.getElementById('card-grid');
  const cluster = document.getElementById('cluster-view');
  const panel = document.getElementById('panel');
  if (view === 'cards') {
    grid.style.display = '';
    cluster.style.display = 'none';
    panel.style.display = activeCard ? '' : 'none';
  } else {
    grid.style.display = 'none';
    cluster.style.display = 'block';
    panel.style.display = 'none';
    renderCluster();
  }
}

detectWechat();
updateStats();
renderCards();
